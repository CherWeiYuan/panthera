name: Python Tests

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        # --group dev ensures pytest and pytest-cov are installed
        run: uv sync --group dev

      - name: Run tests with pytest
        # 'uv run' ensures pytest is executed within the synced environment
        run: uv run pytest

  lint:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: astral-sh/setup-uv@v5
        - name: Install dependencies
          run: uv sync --group dev
        - name: Run Ruff check
          run: uv run ruff check .
        - name: Run Pyright
          run: uv run pyright
